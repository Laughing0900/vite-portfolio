  Low-Severity Issues

  17. Redundant Section Offset Divs

  - Location: src/components/views/LeftTitleCard.tsx:20
  - Severity: Low
  - Description: -mt-one-six-dvh div used for offset, could be done with padding/margin on section.
  - Suggestion: Simplify structure.

  18. Magic Numbers in Scroll Calculations

  - Location: src/components/project/Project.tsx:13-16
  - Severity: Low
  - Description: pageSize = 1 / (projects.length - 1) has no guard for edge cases.
  - Suggestion: Add bounds checking.

  19. Unused index in Timeline

  - Location: src/components/ui/aceternity/timeline.tsx:25
  - Severity: Low
  - Description: index not used in sticky column.
  - Suggestion: Remove or use for something.

  20. Hardcoded Text in Code Blocks

  - Location: src/components/home/talent/cards/Schedule.tsx:11-82
  - Severity: Low
  - Description: SVG chart has hardcoded "better/worse" sample code embedded.
  - Suggestion: Consider if this content should be data-driven.

  21. Console.log Pattern in Code

  - Location: src/components/glass-hero/GlassHeroScene.tsx
  - Severity: Low
  - Description: May contain debug logs.
  - Suggestion: Remove before production.

  22. Spinner Colors

  - Location: Multiple fallback spinners (Skills.tsx, Schedule.tsx)
  - Severity: Low
  - Description: Spinner uses border-primary but border-t-transparent may not match design.
  - Suggestion: Verify spinner aesthetics.

  ---
  Patterns & Systemic Issues

  1. Hardcoded hex colors appear in 8+ components — Should use CSS custom properties from index.css
  2. Missing loading="lazy" on all images — Performance impact site-wide
  3. Glassmorphism/Three.js loaded site-wide — Should be route-specific
  4. Inconsistent heading structure — Sections need proper h1-h6 hierarchy
  5. Nav lacks keyboard accessibility — Focus trap missing

  ---
  Positive Findings

  - Excellent use of OKLCH color model for perceptually uniform palette
  - Custom distinctive font (Post No Bills Colombo) — not generic
  - Good use of CSS custom properties for theming foundation
  - prefers-reduced-motion properly handled
  - memo() used appropriately on pure components
  - Proper ARIA attributes on some interactive elements
  - Good scroll-based animations using Framer Motion transforms (not layout properties)
  - Proper use of React.lazy for code splitting

  ---
  Recommendations by Priority

  Immediate (Critical)

  1. Add keyboard navigation and focus trap to Nav
  2. Lazy load Three.js/GlassHero only on GlassHeroPage
  3. Add loading="lazy" to all images

  Short-term (High)

  4. Convert hardcoded hex colors to CSS variables
  5. Fix alt text descriptions
  6. Add section headings for accessibility
  7. Remove duplicate key prop

  Medium-term (Medium)

  8. Consider removing/reducing glassmorphism
  9. Add light mode tokens (optional)
  10. Fix footer responsive height
  11. Add image dimensions for CLS

  Long-term (Low)

  12. Extract repeated hover:background-radial
  13. Clean up magic numbers
  14. Verify bundle optimization

